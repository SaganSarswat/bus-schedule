<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laari – Route Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M0885C07SW"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-M0885C07SW');
</script>

<script>
function showAd() {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage("showAd");
  }
}
</script>

<style>
body {
  margin: 35px 0px 30px 0px;
  font-family: Arial, sans-serif;
  background: #eef6fb;
}

/* Header */
.topbar {
  display: flex;
  align-items: center;
  padding: 14px;
  background: #ffffff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.logo {
  background: #4aa0e0;
  border-radius: 10px;
  padding: 6px;
  margin-right: 8px;
}

.title {
  font-size: 30px;
  font-weight: bold;
  color: #4aa0e0;
}

/* Card */
.card {
  background: white;
  margin: 15px;
  padding: 20px; /* 🔥 increased padding */
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card-header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.card-header span {
  font-size: 22px;
  margin-right: 8px;
}

.subtitle {
  color: #6b8ca6;
  font-size: 14px;
  margin-bottom: 16px;
}

/* Labels */
label {
  font-size: 14px;
  font-weight: bold;
  display: block;
  margin-top: 14px;
  margin-bottom: 6px;
}

/* Dropdowns */
select {
  width: 100%;
  padding: 14px; /* 🔥 increased */
  border-radius: 10px;
  border: none;
  background: #eaf3ff;
  font-size: 15px;
  margin-bottom: 10px; /* 🔥 spacing */
}

/* Checkbox box */
.checkbox-box {
  margin-top: 16px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #cfe3f3;
  display: flex;
  gap: 10px;
}

/* Button */
.btn {
  margin-top: 18px;
  width: 100%;
  padding: 16px; /* 🔥 bigger */
  background: #4aa0e0;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
}

/* Results */
.results {
  margin: 15px;
}

.result {
  background: white;
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin:10px;
}
.result img {
  width: 32px;
  height: 32px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="bus-stop (1).png" width="32">
  </div>
  <div class="title">Laari</div>
</div>
<center>
<p>By: Karm IT Solutions</p>
</center>
<div class="card">
  <div class="card-header">
    <span>🔀</span>
    <h2>Route Planner</h2>
  </div>

  <div class="subtitle">
    Find bus timings for your journey.
  </div>

  <label>Current Location</label>
  <select id="from"></select>

  <label>Destination</label>
  <select id="to"></select>

  <div>
    <input type="checkbox" id="fullDay"> Show full day schedule
  </div>

  <button class="btn" onclick="handleClick()">🔍 Find Departures</button>
</div>

<div id="results"></div>

<script>
let data = {};

fetch("laari-data.json")
.then(res => res.json())
.then(json => {
  data = json;
  populateStops();
});

function populateStops() {
  const from = document.getElementById("from");
  const to = document.getElementById("to");

  from.innerHTML = `<option value="">Select</option>`;
  to.innerHTML = `<option value="">Select</option>`;

  for (const id in data.busStops) {
    from.innerHTML += `<option value="${id}">${data.busStops[id].name}</option>`;
    to.innerHTML += `<option value="${id}">${data.busStops[id].name}</option>`;
  }
}

function timeToMinutes(t) {
  let [h,m] = t.split(":").map(Number);
  return h*60+m;
}

function getCurrentMinutes() {
  let d = new Date();
  return d.getHours()*60 + d.getMinutes();
}

function handleClick() {
  const success = findBuses();
  if (success) showAd(); // show ad only if valid
}

function findBuses() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const fullDay = document.getElementById("fullDay").checked;
  const results = document.getElementById("results");

  results.innerHTML = "";

  if (!from || !to) {
    results.innerHTML = `<div class="result">Please select both locations.</div>`;
    return false;
  }

  if (from === to) {
    results.innerHTML = `<div class="result">Same location not allowed.</div>`;
    return false;
  }

  const validRoutes = Object.entries(data.routes).filter(([id, route]) =>
    route.stopIds.includes(from) &&
    route.stopIds.includes(to) &&
    route.stopIds.indexOf(from) < route.stopIds.indexOf(to)
  );

  if (validRoutes.length === 0) {
    results.innerHTML = `<div class="result">No route found.</div>`;
    return false;
  }

  const now = getCurrentMinutes();
  let buses = [];

  validRoutes.forEach(([routeId, route]) => {
    Object.values(data.buses).forEach(bus => {
      if (bus.routeId === routeId) {
        let t = timeToMinutes(bus.departureTime);
        if (fullDay || t >= now) {
          buses.push({
            time: bus.departureTime,
            op: bus.operator,
            route: route.name,
            value: t
          });
        }
      }
    });
  });

  buses.sort((a,b)=>a.value-b.value);

  if (buses.length === 0) {
    results.innerHTML = `<div class="result">No buses available.</div>`;
    return false;
  }

  buses.forEach(b=>{
    results.innerHTML += `
    <div class="result">
      <img src="bus-stop (1).png">
      <div>
        <strong>${b.time}</strong><br>
        ${b.op} • ${b.route}
      </div>
    </div>`;
  });

  return true;
}
</script>

</body>
</html>
